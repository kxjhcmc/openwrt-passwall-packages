name: Sync Fork

on:
  schedule:
    - cron: '0 3 * * *'  # 每天 UTC 时间凌晨3点运行（北京时间上午11点）
  workflow_dispatch:     # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the repo
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Git
        run: |
          git config --global user.name 'Your Name'
          git config --global user.email 'your-email@example.com'

      - name: Add upstream
        run: git remote add upstream https://github.com/xiaorouji/openwrt-passwall-packages.git

      - name: Fetch upstream
        run: git fetch upstream

      - name: Merge upstream into main
        run: |
          git checkout main
          git merge upstream/main --allow-unrelated-histories --no-edit || echo "No changes"

      - name: Push changes
        run: |
          git push origin main
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
